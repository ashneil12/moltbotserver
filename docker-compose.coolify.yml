services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw-gateway.rule=Host(`${COOLIFY_FQDN}`)"
      - "traefik.http.routers.openclaw-gateway.entrypoints=https"
      - "traefik.http.routers.openclaw-gateway.tls=true"
      - "traefik.http.routers.openclaw-gateway.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclaw-gateway.loadbalancer.server.port=18789"
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_STATE_DIR=/home/node/data
      - OPENCLAW_WORKSPACE_DIR=/home/node/workspace
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_DISABLE_DEVICE_AUTH=true
      - OPENCLAW_DEFAULT_MODEL=${OPENCLAW_DEFAULT_MODEL:-}
      # Set NODE_ENV to production for runtime
      - NODE_ENV=production
    volumes:
      - openclaw-data:/home/node/data
      - openclaw-workspace:/home/node/workspace
    ports:
      - "${PORT:-18789}:18789"
    networks:
      - coolify
    init: true
    restart: unless-stopped

volumes:
  openclaw-data:
  openclaw-workspace:


networks:
  coolify:
    external: true
